<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCH · Gutachten-Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#14161a;
    --bg-panel:#1c1f24;
    --bg-panel-2:#20242a;
    --line:#33373d;
    --text:#f2efe9;
    --text-dim:#9a9fa6;
    --accent:#e8a33d;
    --accent-dim:#a97427;
    --steel:#5c7a89;
    --danger:#c1533e;
    --ok:#6fa66f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(232,163,61,0.05), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(92,122,137,0.06), transparent 45%);
    color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:32px 20px 80px;
  }
  .wrap{max-width:920px;margin:0 auto;}

  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:2px solid var(--line);
    padding-bottom:18px;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:8px;
  }
  header h1{
    font-family:'Oswald', sans-serif;
    font-weight:700;
    font-size:28px;
    letter-spacing:0.5px;
    margin:0;
    text-transform:uppercase;
  }
  header h1 span{color:var(--accent);}
  header .sub{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:1px;
  }

  .status-bar{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:24px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.5px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--text-dim);
    transition:background .2s ease;
  }
  .dot.online{background:var(--ok); box-shadow:0 0 6px var(--ok);}
  .dot.error{background:var(--danger); box-shadow:0 0 6px var(--danger);}

  .panel{
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:4px;
    padding:26px;
    margin-bottom:28px;
  }

  .form-row{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    margin-bottom:18px;
  }
  .field{flex:1;min-width:200px;}
  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-dim);
    margin-bottom:6px;
  }
  .field input{
    width:100%;
    background:var(--bg-panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:10px 12px;
    border-radius:3px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:14px;
  }
  .field input:focus{
    outline:none;
    border-color:var(--accent);
  }

  .generate-row{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }
  button.primary{
    background:var(--accent);
    color:#1a1a1a;
    border:none;
    font-family:'Oswald', sans-serif;
    font-weight:600;
    font-size:15px;
    text-transform:uppercase;
    letter-spacing:0.8px;
    padding:13px 26px;
    border-radius:3px;
    cursor:pointer;
    transition:transform .12s ease, background .15s ease, opacity .15s ease;
  }
  button.primary:hover{background:#f0ad4d;}
  button.primary:active{transform:scale(0.97);}
  button.primary:disabled{opacity:0.5;cursor:not-allowed;}

  .stamp-area{
    min-height:150px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px;
  }
  .stamp{
    position:relative;
    border:3px solid var(--accent);
    border-radius:8px;
    padding:18px 28px;
    transform:rotate(-3deg);
    animation:stampIn .28s ease-out;
    text-align:center;
    background:rgba(232,163,61,0.05);
  }
  .stamp .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    letter-spacing:3px;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:4px;
  }
  .stamp .code{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    font-size:26px;
    letter-spacing:2px;
    color:var(--accent);
  }
  .stamp-placeholder{
    font-family:'IBM Plex Mono', monospace;
    color:var(--text-dim);
    font-size:13px;
    text-align:center;
  }
  @keyframes stampIn{
    0%{opacity:0; transform:rotate(-3deg) scale(1.4);}
    100%{opacity:1; transform:rotate(-3deg) scale(1);}
  }

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
    gap:12px;
    flex-wrap:wrap;
  }
  .toolbar h2{
    font-family:'Oswald', sans-serif;
    font-size:16px;
    text-transform:uppercase;
    letter-spacing:1px;
    margin:0;
    color:var(--text-dim);
  }
  .toolbar input{
    background:var(--bg-panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:8px 12px;
    border-radius:3px;
    font-family:'IBM Plex Sans', sans-serif;
    font-size:13px;
    min-width:200px;
  }
  .toolbar input:focus{outline:none;border-color:var(--steel);}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
  }
  thead th{
    text-align:left;
    font-family:'IBM Plex Mono', monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    color:var(--text-dim);
    border-bottom:1px solid var(--line);
    padding:8px 10px;
  }
  tbody td{
    padding:10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{background:rgba(255,255,255,0.02);}
  .az-code{
    font-family:'IBM Plex Mono', monospace;
    font-weight:600;
    color:var(--accent);
    letter-spacing:0.5px;
  }
  .muted{color:var(--text-dim);}
  .row-actions{display:flex;gap:8px;}
  .icon-btn{
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    padding:6px 10px;
    border-radius:3px;
    cursor:pointer;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    transition:border-color .15s ease, color .15s ease;
  }
  .icon-btn:hover{border-color:var(--steel);color:var(--text);}
  .icon-btn.danger:hover{border-color:var(--danger);color:var(--danger);}

  .empty{
    text-align:center;
    padding:40px 20px;
    color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
  }

  footer{
    margin-top:20px;
    text-align:center;
    color:var(--text-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.5px;
  }

  @media (max-width:560px){
    header{flex-direction:column;align-items:flex-start;}
    .generate-row{flex-direction:column;align-items:stretch;}
    button.primary{width:100%;}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{border-bottom:2px solid var(--line);padding:10px 0;}
    tbody td{border:none;padding:4px 0;display:flex;justify-content:space-between;}
    tbody td::before{content:attr(data-label);color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>TCH <span>·</span> Gutachten-Register</h1>
    <div class="sub" id="todayLabel">--.--.----</div>
  </header>

  <div class="status-bar">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Verbinde…</span>
  </div>

  <div class="panel">
    <div class="form-row">
      <div class="field">
        <label for="kunde">Kunde (optional)</label>
        <input type="text" id="kunde" placeholder="z. B. M. Muster">
      </div>
      <div class="field">
        <label for="fahrzeug">Fahrzeug / Kennzeichen (optional)</label>
        <input type="text" id="fahrzeug" placeholder="z. B. LU 12345">
      </div>
    </div>
    <div class="generate-row">
      <button class="primary" id="generateBtn">Aktenzeichen erstellen</button>
    </div>
    <div class="stamp-area" id="stampArea">
      <div class="stamp-placeholder">Noch kein Aktenzeichen erzeugt.</div>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <h2>Register (<span id="countLabel">0</span>)</h2>
      <input type="text" id="searchBox" placeholder="Suche nach Aktenzeichen, Kunde, Fahrzeug…">
    </div>
    <div id="tableWrap"></div>
  </div>

  <footer>Synchronisiert für alle Kollegen · TCH Gutachten-Register</footer>
</div>

<script>
// ---- Supabase Konfiguration ----
const SUPABASE_URL = 'https://rbnrppheuvbmnlidcmei.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7A48mPikMbsGVrJOWJr98g_g2AtN1pF';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let localCache = [];

function pad(n, len=2){ return String(n).padStart(len,'0'); }
function todayKey(d = new Date()){
  return `${pad(d.getDate())}${pad(d.getMonth()+1)}${String(d.getFullYear()).slice(-2)}`;
}
function todayDisplay(d = new Date()){
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
}

function setStatus(state, text){
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (state ? ' ' + state : '');
  document.getElementById('statusText').textContent = text;
}

async function loadAll(){
  const { data, error } = await sb
    .from('gutachten_register')
    .select('*')
    .order('created_at', { ascending: false });

  if(error){
    setStatus('error', 'Fehler beim Laden: ' + error.message);
    return;
  }
  localCache = data || [];
  renderTable();
}

function renderStamp(entry){
  const area = document.getElementById('stampArea');
  area.innerHTML = `
    <div class="stamp">
      <div class="label">TCH Gutachten</div>
      <div class="code">${entry.aktenzeichen}</div>
    </div>
  `;
}

function renderTable(){
  const query = document.getElementById('searchBox').value.trim().toLowerCase();
  const filtered = query
    ? localCache.filter(e =>
        e.aktenzeichen.toLowerCase().includes(query) ||
        (e.kunde||'').toLowerCase().includes(query) ||
        (e.fahrzeug||'').toLowerCase().includes(query))
    : localCache;

  document.getElementById('countLabel').textContent = localCache.length;

  const wrap = document.getElementById('tableWrap');
  if(filtered.length === 0){
    wrap.innerHTML = `<div class="empty">${query ? 'Keine Treffer.' : 'Noch keine Einträge im Register.'}</div>`;
    return;
  }

  let rows = filtered.map(e => `
    <tr>
      <td data-label="Aktenzeichen"><span class="az-code">${e.aktenzeichen}</span></td>
      <td data-label="Datum">${e.datum}</td>
      <td data-label="Kunde">${e.kunde || '<span class="muted">–</span>'}</td>
      <td data-label="Fahrzeug">${e.fahrzeug || '<span class="muted">–</span>'}</td>
      <td data-label="Aktionen">
        <div class="row-actions">
          <button class="icon-btn" onclick="copyAZ('${e.aktenzeichen}')">Kopieren</button>
          <button class="icon-btn danger" onclick="deleteEntry('${e.id}')">Löschen</button>
        </div>
      </td>
    </tr>
  `).join('');

  wrap.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Aktenzeichen</th>
          <th>Datum</th>
          <th>Kunde</th>
          <th>Fahrzeug</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

window.copyAZ = function(az){
  navigator.clipboard.writeText(az).catch(()=>{});
};

window.deleteEntry = async function(id){
  const { error } = await sb.from('gutachten_register').delete().eq('id', id);
  if(error){
    alert('Löschen fehlgeschlagen: ' + error.message);
    return;
  }
  // Realtime-Update übernimmt das Neuladen; als Fallback lokal sofort entfernen
  localCache = localCache.filter(e => e.id !== id);
  renderTable();
};

document.getElementById('generateBtn').addEventListener('click', async () => {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  try{
    const dk = todayKey();
    const { data: nextNum, error: rpcError } = await sb
      .rpc('increment_gutachten_counter', { p_datum: dk });

    if(rpcError){
      alert('Fehler beim Erzeugen: ' + rpcError.message);
      return;
    }

    const az = `TCH-${dk}-${pad(nextNum)}`;
    const entry = {
      aktenzeichen: az,
      datum: todayDisplay(),
      kunde: document.getElementById('kunde').value.trim(),
      fahrzeug: document.getElementById('fahrzeug').value.trim()
    };

    const { data: inserted, error: insertError } = await sb
      .from('gutachten_register')
      .insert(entry)
      .select()
      .single();

    if(insertError){
      alert('Fehler beim Speichern: ' + insertError.message);
      return;
    }

    renderStamp(inserted);
    document.getElementById('kunde').value = '';
    document.getElementById('fahrzeug').value = '';
    // Liste aktualisiert sich über die Realtime-Subscription
  } finally {
    btn.disabled = false;
  }
});

document.getElementById('searchBox').addEventListener('input', renderTable);

// ---- Realtime: alle Kollegen sehen neue Einträge sofort ----
sb
  .channel('gutachten_register_changes')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'gutachten_register' }, () => {
    loadAll();
  })
  .subscribe((status) => {
    if(status === 'SUBSCRIBED'){
      setStatus('online', 'Live verbunden – Änderungen werden synchronisiert');
    } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
      setStatus('error', 'Verbindung unterbrochen – Seite neu laden');
    }
  });

document.getElementById('todayLabel').textContent = todayDisplay();
loadAll();
</script>

</body>
</html>
